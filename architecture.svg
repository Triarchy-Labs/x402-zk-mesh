<svg width="1000" height="420" viewBox="0 0 1000 420" xmlns="http://www.w3.org/2000/svg" style="background-color: transparent; font-family: 'Inter', -apple-system, sans-serif;">
  <defs>
    <!-- Neons -->
    <linearGradient id="neonCyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d2ff" />
      <stop offset="100%" stop-color="#005c8a" />
    </linearGradient>
    <linearGradient id="neonGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffcc00" />
      <stop offset="100%" stop-color="#b38f00" />
    </linearGradient>
    <linearGradient id="neonGray" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a8b2d1" />
      <stop offset="100%" stop-color="#0a192f" />
    </linearGradient>

    <!-- Glow Filter -->
    <filter id="glowCyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <marker id="arrowCyan" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#00d2ff"/>
    </marker>
    <marker id="arrowGold" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ffcc00"/>
    </marker>
  </defs>

  <!-- Left: Entry Points -->
  <g transform="translate(40, 60)">
    <rect width="180" height="60" rx="12" fill="#0b0f19" stroke="url(#neonGray)" stroke-width="2"/>
    <text x="90" y="26" fill="#e2e8f0" font-size="14" font-weight="700" text-anchor="middle">Farcaster Frame</text>
    <text x="90" y="44" fill="#64ffda" font-size="11" text-anchor="middle">Token Verification</text>
  </g>
  <g transform="translate(40, 160)">
    <rect width="180" height="60" rx="12" fill="#0b0f19" stroke="url(#neonGray)" stroke-width="2"/>
    <text x="90" y="26" fill="#e2e8f0" font-size="14" font-weight="700" text-anchor="middle">External Agent</text>
    <text x="90" y="44" fill="#a8b2d1" font-size="11" text-anchor="middle">HTTP POST /api/hire</text>
  </g>

  <!-- Mid-Left: Gateway API -->
  <g transform="translate(320, 110)">
    <rect width="200" height="80" rx="12" fill="#0b0f19" stroke="url(#neonCyan)" stroke-width="2" filter="url(#glowCyan)"/>
    <text x="100" y="38" fill="#e2e8f0" font-size="16" font-weight="700" text-anchor="middle">x402 Gateway API</text>
    <text x="100" y="58" fill="#64ffda" font-size="12" text-anchor="middle">L402 Endpoint Listener</text>
  </g>

  <!-- Above Gateway: Soroban Validator -->
  <g transform="translate(320, 10)">
    <rect width="200" height="60" rx="8" fill="#0b0f19" stroke="url(#neonGold)" stroke-width="2"/>
    <text x="100" y="26" fill="#ffcc00" font-size="13" font-weight="700" text-anchor="middle">Soroban Validator</text>
    <text x="100" y="44" fill="#a8b2d1" font-size="11" text-anchor="middle">Stellar Horizon RPC</text>
  </g>

  <!-- Mid-Right: WASM Sandbox -->
  <g transform="translate(600, 110)">
    <rect width="200" height="80" rx="12" fill="#0b0f19" stroke="url(#neonGray)" stroke-width="2"/>
    <text x="100" y="38" fill="#e2e8f0" font-size="16" font-weight="700" text-anchor="middle">WASM Sandbox</text>
    <text x="100" y="58" fill="#ff4500" font-size="12" font-weight="700" text-anchor="middle">Zero-Trust Quarantine</text>
  </g>

  <!-- Right: 3-Tier Router -->
  <g transform="translate(600, 240)">
    <rect width="200" height="130" rx="12" fill="#0b0f19" stroke="url(#neonCyan)" stroke-width="2"/>
    <text x="100" y="26" fill="#e2e8f0" font-size="14" font-weight="700" text-anchor="middle">3-Tier Strategy Router</text>
    <rect x="20" y="45" width="160" height="20" rx="4" fill="#0f172a"/>
    <text x="100" y="58" fill="#64ffda" font-size="10" text-anchor="middle">Tier 1: Local LLM (&lt;$5)</text>
    <rect x="20" y="70" width="160" height="20" rx="4" fill="#0f172a"/>
    <text x="100" y="83" fill="#64ffda" font-size="10" text-anchor="middle">Tier 2: Enterprise (&gt;=$5)</text>
    <rect x="20" y="95" width="160" height="20" rx="4" fill="#0f172a"/>
    <text x="100" y="108" fill="#00d2ff" font-size="10" font-weight="700" text-anchor="middle">Tier 3: P2P Soroban Bounty</text>
  </g>

  <!-- Additional Node for Soroban Settlement -->
  <g transform="translate(850, 255)">
    <rect width="120" height="100" rx="8" fill="#000000" stroke="#00d2ff" stroke-width="2"/>
    <text x="60" y="45" fill="#e2e8f0" font-size="12" font-weight="700" text-anchor="middle">Smart</text>
    <text x="60" y="60" fill="#e2e8f0" font-size="12" font-weight="700" text-anchor="middle">Contract</text>
    <text x="60" y="75" fill="#64ffda" font-size="10" text-anchor="middle">Settlement</text>
  </g>

  <!-- Connections -->
  <!-- Farcaster & External -> Gateway API -->
  <path d="M 220 90 L 320 130" stroke="#00d2ff" stroke-width="2" marker-end="url(#arrowCyan)"/>
  <path d="M 220 190 L 320 160" stroke="#00d2ff" stroke-width="2" marker-end="url(#arrowCyan)"/>
  
  <!-- Gateway -> Validator -->
  <path d="M 420 110 L 420 70" stroke="#ffcc00" stroke-width="2" marker-end="url(#arrowGold)"/>
  <rect x="365" y="80" width="110" height="20" rx="4" fill="#0f172a" stroke="#1e293b"/>
  <text x="420" y="93" fill="#94a3b8" font-size="10" font-weight="600" text-anchor="middle">1. Validate TX Hash</text>

  <!-- Gateway -> WASM -->
  <path d="M 520 150 L 600 150" stroke="#00d2ff" stroke-width="2" marker-end="url(#arrowCyan)"/>
  <rect x="525" y="138" width="60" height="20" rx="4" fill="#0f172a" stroke="#1e293b"/>
  <text x="555" y="151" fill="#94a3b8" font-size="10" font-weight="600" text-anchor="middle">2. Quarantine</text>

  <!-- WASM -> Router -->
  <path d="M 700 190 L 700 240" stroke="#00d2ff" stroke-width="2" marker-end="url(#arrowCyan)"/>
  <rect x="660" y="205" width="80" height="20" rx="4" fill="#0f172a" stroke="#1e293b"/>
  <text x="700" y="218" fill="#64ffda" font-size="10" font-weight="600" text-anchor="middle">3. Safe Route</text>

  <!-- Router -> Settlement -->
  <path d="M 800 305 L 850 305" stroke="#00d2ff" stroke-width="2" marker-end="url(#arrowCyan)"/>

</svg>
